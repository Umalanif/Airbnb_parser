<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirBnb Price Tracker</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AirBnb Price Tracker</h1>
      <p class="subtitle">Monitor listing prices and availability</p>
    </header>

    <section class="add-listing-section">
      <h2>Add New Listing</h2>
      <form id="addListingForm">
        <div class="form-group">
          <label for="listingUrl">AirBnb URL</label>
          <input 
            type="url" 
            id="listingUrl" 
            name="url" 
            placeholder="https://www.airbnb.com/rooms/12345678?check_in=2026-04-15&check_out=2026-04-20"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary">Add Listing</button>
      </form>
      <div id="formMessage" class="message"></div>
    </section>

    <section class="compare-section">
      <div class="compare-header">
        <h2>Tracked Listings</h2>
        <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
      </div>
      <div id="loadingIndicator" class="loading hidden">
        <div class="spinner"></div>
        <span>Loading data...</span>
      </div>
      <div id="compareTable" class="table-container">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Check-in</th>
              <th>Check-out</th>
              <th>Price</th>
              <th>Delta</th>
              <th>Status</th>
              <th>Last Updated</th>
            </tr>
          </thead>
          <tbody id="listingsBody">
          </tbody>
        </table>
      </div>
      <div id="emptyState" class="empty-state hidden">
        <p>No listings tracked yet. Add your first listing above.</p>
      </div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
